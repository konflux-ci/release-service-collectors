apiVersion: appstudio.redhat.com/v1beta2
kind: IntegrationTestScenario
metadata:
  name: test-hello
  namespace: user-ns2
spec:
  application: test-component
  contexts:
    - description: Application testing
      name: application
  resolverRef:
    params:
      - name: url
        value: https://github.com/<CHANGEME-ORG>/testrepo.git
      - name: revision
        value: main
      - name: pathInRepo
        value: integration-tests/testrepo-integration.yaml
    resolver: git
